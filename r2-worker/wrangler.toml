name = "r2-worker"
main = "src/index.js"
compatibility_date = "2024-12-07"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
preview_urls = true
routes = [
  { pattern = "worker.unboundfuture.ai/worker", zone_name = "unboundfuture.ai" },
  { pattern = "worker.unboundfuture.ai", zone_name = "unboundfuture.ai", custom_domain = true },
  { pattern = "testchange.unboundfuture.ai/worker", zone_name = "unboundfuture.ai" },
  { pattern = "testchange.unboundfuture.ai", zone_name = "unboundfuture.ai", custom_domain = true }
]

[vars]
# S3 Compatible Storage Credentials (Destination)
# AWS_ACCESS_KEY_ID = "your_access_key"
# AWS_SECRET_ACCESS_KEY = "your_secret_key"
# AWS_REGION = "cn-shanghai" # e.g., cn-beijing, us-east-1

# Internal retry attempts inside r2-worker.
# Keep this low so worker_transfer remains the main retry controller.
UPLOAD_RETRY_ATTEMPTS = "2"

# Stage-specific business timeouts for copy_pipeline.
# Source fetch is expected to be very fast; destination upload is much slower.
SOURCE_FETCH_TIMEOUT_SECONDS = "5"
DEST_UPLOAD_TIMEOUT_SECONDS = "180"

# Source R2/S3 Credentials
# SOURCE_ACCESS_KEY_ID = "source_access_key"
# SOURCE_SECRET_ACCESS_KEY = "source_secret_key"

[placement]
region = "aws:ap-southeast-1"

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 0.5
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
