name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

env:
  REGISTRY: image.unboundfuture.ai

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: Frontend
            context: frontend
            dockerfile: frontend/Dockerfile
            image: unbound-frontend
          - component: Backend API
            context: backend/go-app
            dockerfile: backend/go-app/Dockerfile
            image: unbound-backend
          - component: Worker Downloader
            context: backend
            dockerfile: backend/worker_downloader/Dockerfile
            image: unbound-worker-downloader
          - component: Worker Transfer
            context: backend/worker_transfer
            dockerfile: backend/worker_transfer/Dockerfile
            image: unbound-worker-transfer
          - component: Worker FFmpeg
            context: backend/worker_ffmpeg
            dockerfile: backend/worker_ffmpeg/Dockerfile
            image: unbound-worker-ffmpeg
          - component: Proxy Tester
            context: .
            dockerfile: backend/proxy_tester/Dockerfile
            image: unbound-proxy-tester
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            changed:
              - '${{ matrix.context }}/**'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        if: steps.filter.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push ${{ matrix.component }}
        if: steps.filter.outputs.changed == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ matrix.image }}:latest
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}