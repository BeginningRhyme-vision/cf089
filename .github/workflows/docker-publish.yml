name: Build and Push Docker Images

on:
  push:
    branches: [ "feat/golang" ]
    paths:
      - 'backend/**'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

env:
  REGISTRY: image.unboundfuture.ai

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Backend API
        uses: docker/build-push-action@v5
        with:
          context: backend/go-app
          push: true
          tags: ${{ env.REGISTRY }}/unbound-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker Downloader
        uses: docker/build-push-action@v5
        with:
          context: backend/worker_downloader
          push: true
          tags: ${{ env.REGISTRY }}/unbound-worker-downloader:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Worker Transfer
        uses: docker/build-push-action@v5
        with:
          context: backend/worker_transfer
          push: true
          tags: ${{ env.REGISTRY }}/unbound-worker-transfer:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
