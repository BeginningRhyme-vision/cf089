name: Backend CI Tag - Docker Build & Push

on:
  push:
    # 当有 tag 推送时触发 CI
    tags:
      - '*'

jobs:
  build-and-push:
    # 整个 Job 的超时时间，避免构建长时间占用资源
    timeout-minutes: 30

    # 使用 GitHub 托管的最新稳定版 Ubuntu 作为运行环境
    runs-on: ubuntu-latest

    # 在 Job 层统一定义一些环境变量，避免重复书写
    env:
      # 使用当前 Git tag 作为镜像 Tag，保持与发布 tag 一致
      IMAGE_TAG: ${{ github.ref_name }}
      # 镜像仓库地址（使用 HTTPS，Docker 默认通过 HTTPS 通信）
      REGISTRY: r2-registry-production.cf022.workers.dev
      # 仓库名使用 <owner>/<repo> 形式，保持唯一性
      IMAGE_NAME: ${{ github.repository }}-backend
      ARGOCD_REPO: unbound-future/argocd
      ARGOCD_BRANCH: ${{ vars.ARGOCD_BRANCH }}
      ARGOCD_BACKEND_FILE_PATH: ${{ vars.ARGOCD_BACKEND_FILE_PATH }}

    steps:
      # 1. 检出当前仓库代码，用于后续 Docker 构建
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          # 确保获取完整历史（某些场景下构建可能依赖 Git 信息）
          fetch-depth: 0

      # 2. 确认 / 安装必要的基础构建工具（Ubuntu runner 默认已安装 Docker）
      - name: 安装基础构建工具
        run: |
          sudo apt-get update
          # 安装/更新证书与 curl 等基础工具，确保 HTTPS 与通知功能正常
          sudo apt-get install -y ca-certificates curl

      # 3. 使用 Buildx（可选，但推荐）以获得更好的构建体验（缓存、多平台等）
      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 4. 登录镜像仓库
      #    - 使用 GitHub Secrets 中的 R2_USERNAME 和 R2_PASSWORD
      #    - Secrets 仅在运行时通过环境变量注入，不会写入文件或日志
      #    - GitHub Actions 会自动对 secrets 进行日志脱敏，防止泄露
      - name: 登录镜像仓库
        env:
          R2_USERNAME: ${{ secrets.R2_USERNAME }}
          R2_PASSWORD: ${{ secrets.R2_PASSWORD }}
        run: |
          echo "$R2_PASSWORD" | docker login "$REGISTRY" \
            --username "$R2_USERNAME" \
            --password-stdin

      # 5. 构建 Docker 镜像
      #    - 从项目根目录的 Dockerfile 构建
      #    - 镜像 Tag 使用当前 Git tag（IMAGE_TAG）
      #    - 构建输出通过 tee 记录到日志文件，用于后续问题排查
      - name: 构建 Backend Docker 镜像
        run: |
          FULL_IMAGE_NAME="$REGISTRY/$IMAGE_NAME:$IMAGE_TAG"
          echo "构建镜像: $FULL_IMAGE_NAME"
          docker build \
            -f Dockerfile-backend \
            -t "$FULL_IMAGE_NAME" \
            . 

      # 6. 推送 Docker 镜像到远程仓库
      #    - 推送同一 Tag 的镜像
      #    - 推送日志同样记录到文件
      - name: 推送 Backend Docker 镜像
        run: |
          FULL_IMAGE_NAME="$REGISTRY/$IMAGE_NAME:$IMAGE_TAG"
          echo "推送镜像: $FULL_IMAGE_NAME"
          docker push "$FULL_IMAGE_NAME" 

      - name: 获取 GitHub App Token
        uses: actions/create-github-app-token@v1
        id: app-token
        with:
          app-id: ${{ secrets.GITHUBAPP_ID }}
          private-key: ${{ secrets.GITHUBAPP_PRIVATE_KEY }}
          # 如果 ArgoCD 仓库在另一个账号下，请填写 owner
          owner: ${{ github.repository_owner }} 

      - name: 检出 ArgoCD 仓库
        uses: actions/checkout@v4
        with:
          repository: unbound-future/argocd
          # 使用上面生成的短效 Token
          token: ${{ steps.app-token.outputs.token }}
          ref: ${{ env.ARGOCD_BRANCH }}
          path: argocd-repo

      - name: 更新镜像并推送到 ArgoCD 仓库
        run: |
          FULL_IMAGE_NAME="$REGISTRY/$IMAGE_NAME:$IMAGE_TAG"
          cd argocd-repo
          
          # 1. 直接覆盖整个 image 字段内容
          yq -i '(.spec.template.spec.containers[] | select(.name == "unbound-future-admin-backend")).image = strenv(FULL_IMAGE)' "${{ env.ARGOCD_BACKEND_FILE_PATH }}"

          # 2. 配置 Git 身份
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # 3. 检查是否有实际变更
          if git diff --exit-code "${{ env.ARGOCD_BACKEND_FILE_PATH }}"; then
            echo "文件内容未发生变化，跳过提交。"
            exit 0
          fi

          # 4. 提交并推送
          git add "${{ env.ARGOCD_BACKEND_FILE_PATH }}"
          git commit -m "ci: update deployment image to $FULL_IMAGE"
          git push origin ${{ env.ARGOCD_BRANCH }}


      # 构建失败时发送通知
      #    - 此处以任意 Webhook（如企业微信/飞书/Slack/自建服务）为例
      #    - 用户需要在仓库 Secrets 中配置 NOTIFY_WEBHOOK_URL
      #    - 只在本 Job 失败时触发
      - name: 构建失败通知
        if: failure()
        env:
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
        run: |
          if [ -z "$NOTIFY_WEBHOOK_URL" ]; then
            echo "未配置 NOTIFY_WEBHOOK_URL，跳过失败通知。"
            exit 0
          fi

          # 组装简单的 JSON 消息体，可按需要调整结构
          payload=$(
            jq -n \
              --arg repo "${GITHUB_REPOSITORY}" \
              --arg sha "${GITHUB_SHA}" \
              --arg url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
              '{
                text: "⚠️ CI 构建失败",
                repo: $repo,
                sha: $sha,
                url: $url
              }'
          )

          curl -X POST \
            -H "Content-Type: application/json" \
            -d "$payload" \
            "$NOTIFY_WEBHOOK_URL"
