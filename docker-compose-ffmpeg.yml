version: '3.8'

services:
  ffmpeg-scanner:
    image: 209.222.101.19:5000/unbound-worker-ffmpeg:latest
    command: ["ffmpeg_scanner"]
    environment:
      # 请修改为后端 API 的实际 IP 地址 (例如 http://209.222.101.19:8080/api)
      - BACKEND_API_URL=http://YOUR_BACKEND_IP:8080/api
      # 请修改为 Redis 的实际 IP 地址，并带密码 (例如 redis://:redis_password@209.222.101.19:6379/0)
      - REDIS_URL=redis://:redis_password@YOUR_REDIS_IP:6379/0
      # 云厂商路由过滤（scanner 使用）
      - PROVIDER=aliyun
      - ZONE=cn-hangzhou
      # 队列前缀隔离（scanner/worker 必须一致）
      - FFMPEG_QUEUE_PREFIX=ffmpeg-aliyun
      # 强制要求 endpoint 为内网地址（scanner 生效）
      - FFMPEG_REQUIRE_PRIVATE_ENDPOINT=true
      - FFMPEG_INTERNAL_ENDPOINT_KEYWORDS=internal,intranet,private,privatelink,vpc,aliyuncs,ivolces,tos-s3
    restart: always

  ffmpeg-worker:
    image: 209.222.101.19:5000/unbound-worker-ffmpeg:latest
    command: ["ffmpeg_worker"]
    environment:
      # 请修改为后端 API 的实际 IP 地址
      - BACKEND_API_URL=http://YOUR_BACKEND_IP:8080/api
      # 请修改为 Redis 的实际 IP 地址，并带密码
      - REDIS_URL=redis://:redis_password@YOUR_REDIS_IP:6379/0
      - MAX_THREADS=32
      # 队列前缀隔离（scanner/worker 必须一致）
      - FFMPEG_QUEUE_PREFIX=ffmpeg-aliyun
    # FFmpeg 需要较大的共享内存
    shm_size: "40gb"
    restart: always
