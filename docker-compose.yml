services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass redis_password
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - unbound
    restart: always

  backend-api:
    image: 209.222.101.19:5000/unbound-backend:latest
    build:
      context: ./backend/go-app
    ports:
      - "8080:8080"
    volumes:
      - ./config/config.yaml:/app/config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/metrics || exit 1"]
      interval: 10s
      start_period: 5s
    networks:
      - unbound

  frontend:
    image: 209.222.101.19:5000/unbound-frontend:latest
    build:
      context: ./frontend
    ports:
      - "80:80"
      - "3000:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend-api
    networks:
      - unbound

  worker-downloader-py:
    image: 209.222.101.19:5000/unbound-worker-downloader:latest
    build:
      context: ./backend
      dockerfile: worker_downloader/Dockerfile
    command: ["python", "get_yt_metadata.py"]
    environment:
      - BACKEND_API_URL=http://backend-api:8080/api
    volumes:
      - ./config/config.yaml:/app/config.yaml
    depends_on:
      - backend-api
    networks:
      - unbound

  worker-transfer-scanner:
    image: 209.222.101.19:5000/unbound-worker-transfer:latest
    build:
      context: ./backend/worker_transfer
    command: ["scanner"]
    environment:
      - BACKEND_API_URL=http://backend-api:8080/api
    volumes:
      - ./config/config.yaml:/app/config.yaml
    depends_on:
      - backend-api
    networks:
      - unbound

  proxy-tester:
    image: 209.222.101.19:5000/unbound-proxy-tester:latest
    build:
      context: .
      dockerfile: backend/proxy_tester/Dockerfile
    volumes:
      - ./config/config.yaml:/root/config.yaml
    networks:
      - unbound

  # --- 以下服务在 k8s 中 replicas=0（默认不启动）---
  # 需要时用: docker compose --profile optional up
  worker-downloader-go:
    image: 209.222.101.19:5000/unbound-worker-downloader:latest
    build:
      context: ./backend
      dockerfile: worker_downloader/Dockerfile
    command: ["downloader"]
    environment:
      - BACKEND_API_URL=http://backend-api:8080/api
      - WORKER_ID=worker-downloader-go-1
    volumes:
      - ./config/config.yaml:/app/config.yaml
    depends_on:
      - backend-api
    profiles:
      - optional
    networks:
      - unbound

  worker-transfer-agent:
    image: 209.222.101.19:5000/unbound-worker-transfer:latest
    build:
      context: ./backend/worker_transfer
    command: ["transfer"]
    environment:
      - BACKEND_API_URL=http://backend-api:8080/api
    volumes:
      - ./config/config.yaml:/app/config.yaml
    depends_on:
      - backend-api
    profiles:
      - optional
    networks:
      - unbound

networks:
  unbound:
    driver: bridge

volumes:
  redis_data:
