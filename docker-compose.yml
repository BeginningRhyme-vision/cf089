services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass redis_password --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a redis_password ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unbound
    restart: always

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: unbound_future_db
      POSTGRES_USER: unbound_future
      POSTGRES_PASSWORD: Unbound_future618
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unbound_future -d unbound_future_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unbound
    restart: always

  backend-api:
    image: 209.222.101.19:5000/unbound-backend:latest
    build:
      context: ./backend/go-app
    ports:
      - "8080:8080"
    volumes:
      - ./config/config.yaml:/app/config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/metrics || exit 1"]
      interval: 10s
      start_period: 5s
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - unbound

  frontend:
    image: 209.222.101.19:5000/unbound-frontend:latest
    build:
      context: ./frontend
    ports:
      - "80:80"
      - "3000:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend-api
    networks:
      - unbound

  worker-downloader-py:
    image: 209.222.101.19:5000/unbound-worker-downloader:latest
    build:
      context: ./backend/worker_downloader
      dockerfile: Dockerfile
    command: ["python", "get_yt_metadata.py"]
    environment:
      - BACKEND_API_URL=http://backend-api:8080/api
      - MACHINE_NAME=yt-node-1
      - METADATA_MAX_THREADS=32
    volumes:
      - ./config/config.yaml:/app/config.yaml
    depends_on:
      - backend-api
    networks:
      - unbound

  worker-transfer-scanner:
    image: 209.222.101.19:5000/unbound-worker-transfer:latest
    build:
      context: ./backend/worker_transfer
    command: ["scanner"]
    environment:
      - BACKEND_API_URL=http://backend-api:8080/api
    volumes:
      - ./config/config.yaml:/app/config.yaml
    depends_on:
      - backend-api
    networks:
      - unbound

  proxy-tester:
    image: 209.222.101.19:5000/unbound-proxy-tester:latest
    build:
      context: .
      dockerfile: backend/proxy_tester/Dockerfile
    volumes:
      - ./config/config.yaml:/root/config.yaml
    networks:
      - unbound

  worker-downloader-go:
    image: 209.222.101.19:5000/unbound-worker-downloader:latest
    build:
      context: ./backend/worker_downloader
      dockerfile: Dockerfile
    command: ["downloader"]
    environment:
      - BACKEND_API_URL=http://backend-api:8080/api
      - WORKER_ID=worker-downloader-go-1
      - MACHINE_NAME=yt-node-1
      - DOWNLOAD_MAX_CONCURRENT_WORKERS=96
      - DOWNLOAD_CONCURRENT_CHUNKS_PER_FILE=12
      - DOWNLOAD_REQUESTS_PER_MINUTE=3600
      - DOWNLOAD_TASK_BUFFER_SIZE=400
    volumes:
      - ./config/config.yaml:/app/config.yaml
    depends_on:
      - backend-api
    networks:
      - unbound

  worker-transfer-agent:
    image: 209.222.101.19:5000/unbound-worker-transfer:latest
    build:
      context: ./backend/worker_transfer
    command: ["transfer"]
    environment:
      - BACKEND_API_URL=http://backend-api:8080/api
      - TRANSFER_MAX_WORKERS=128
      - TRANSFER_TASK_BUFFER=64
      - TRANSFER_PART_CONCURRENCY=8
    volumes:
      - ./config/config.yaml:/app/config.yaml
    depends_on:
      - backend-api
    networks:
      - unbound

networks:
  unbound:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
