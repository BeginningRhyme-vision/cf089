services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass redis_password --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a redis_password --raw ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10m
    networks:
      - unbound
    restart: always

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: unbound_future_db
      POSTGRES_USER: unbound_future
      POSTGRES_PASSWORD: Unbound_future618
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U unbound_future -d unbound_future_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unbound
    restart: always

  backend-api:
    image: 209.222.101.19:5000/unbound-backend:latest
    build:
      context: ./backend/go-app
    environment:
      - TRANSFER_MULTIPART_CHECKPOINT_TTL_HOURS=72
      - TRANSFER_RESUME_RESERVED_WORKERS=1024
      - TRANSFER_DEFERRED_STREAK_SOFT_LIMIT=128
      - TRANSFER_MULTIPART_THRESHOLD_MB=45
      - TRANSFER_MIN_PART_SIZE_MB=32
      - TRANSFER_MAX_WORKERS=5120
      - TRANSFER_AUTO_RETRY_FAILED_ENABLED=true
      - TRANSFER_AUTO_RETRY_FAILED_COOLDOWN_SECONDS=10
      - TRANSFER_AUTO_RETRY_FAILED_BATCH_SIZE=512
      - TRANSFER_AUTO_RETRY_FAILED_POLL_SECONDS=2
    ports:
      - "8080:8080"
    volumes:
      - ./config/config.yaml:/app/config.yaml
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/metrics >/dev/null"]
      interval: 10s
      start_period: 5s
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - unbound

  frontend:
    image: 209.222.101.19:5000/unbound-frontend:latest
    build:
      context: ./frontend
    ports:
      - "80:80"
      - "3000:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend-api
    networks:
      - unbound

  worker-downloader-py:
    image: 209.222.101.19:5000/unbound-worker-downloader:latest
    build:
      context: ./backend/worker_downloader
      dockerfile: Dockerfile
    command: ["python", "get_yt_metadata.py"]
    environment:
      - BACKEND_API_URL=http://backend-api:8080/api
      - MACHINE_NAME=yt-node-1
      - METADATA_MAX_THREADS=64
      - METADATA_TASK_MAX_ATTEMPTS=9
      - METADATA_TASK_RETRY_BACKOFF_SECONDS=5
      - YT_DLP_AUTO_UPDATE_ENABLED=1
      - YT_DLP_AUTO_UPDATE_INTERVAL_SECONDS=3600
      - YT_DLP_AUTO_UPDATE_TIMEOUT_SECONDS=300
    volumes:
      - ./config/config.yaml:/app/config.yaml
    depends_on:
      - backend-api
    networks:
      - unbound

  worker-transfer-scanner:
    image: 209.222.101.19:5000/unbound-worker-transfer:latest
    build:
      context: ./backend/worker_transfer
    command: ["scanner"]
    environment:
      - BACKEND_API_URL=http://backend-api:8080/api
    volumes:
      - ./config/config.yaml:/app/config.yaml
    depends_on:
      - backend-api
    dns:
      - 1.1.1.1
      - 8.8.8.8
      - 223.5.5.5
    networks:
      - unbound

  proxy-tester:
    image: 209.222.101.19:5000/unbound-proxy-tester:latest
    build:
      context: .
      dockerfile: backend/proxy_tester/Dockerfile
    volumes:
      - ./config/config.yaml:/root/config.yaml
    networks:
      - unbound

  worker-downloader-go:
    image: 209.222.101.19:5000/unbound-worker-downloader:latest
    build:
      context: ./backend/worker_downloader
      dockerfile: Dockerfile
    command: ["downloader"]
    environment:
      - BACKEND_API_URL=http://backend-api:8080/api
      - MACHINE_NAME=yt-node-1
      - USE_PROXY=true
      - DOWNLOAD_MAX_CONCURRENT_WORKERS=128
      - DOWNLOAD_CONCURRENT_CHUNKS_PER_FILE=4
      - DOWNLOAD_REQUESTS_PER_MINUTE=7200
      - DOWNLOAD_TASK_BUFFER_SIZE=1600
      - DOWNLOAD_CHUNK_SIZE=256108864
      - DOWNLOAD_LISTPARTS_CONCURRENCY=4
      - DOWNLOAD_UPLOAD_RECOVERY_TIMEOUT_SECONDS=1200
      - DOWNLOAD_SINGLE_VERIFY_TIMEOUT_SECONDS=600
      - DOWNLOAD_MISSING_ETAG_RETRY_ATTEMPTS=3
      - DOWNLOAD_TRANSFER_MAX_ATTEMPTS=3
      - DOWNLOAD_TRANSFER_RETRY_BACKOFF_SECONDS=5
      - DIRECT_R2_UPLOAD=false
      - DIRECT_R2_MAX_BYTES=0
    volumes:
      - ./config/config.yaml:/app/config.yaml
    depends_on:
      - backend-api
    dns:
      - 1.1.1.1
      - 8.8.8.8
      - 223.5.5.5
    networks:
      - unbound

  worker-transfer-agent:
    image: 209.222.101.19:5000/unbound-worker-transfer:latest
    build:
      context: ./backend/worker_transfer
    command: ["transfer"]
    environment:
      - BACKEND_API_URL=http://backend-api:8080/api
      - TRANSFER_MAX_WORKERS=5120
      - TRANSFER_TASK_BUFFER=1024
      - TRANSFER_ACQUIRE_EMPTY_BACKOFF_MIN_MS=200
      - TRANSFER_ACQUIRE_EMPTY_BACKOFF_MAX_MS=800
      - TRANSFER_ACQUIRE_ERROR_BACKOFF_MS=2000
      - TRANSFER_PART_CONCURRENCY=8
      - TRANSFER_RESUME_FAIL_STREAK_LIMIT=5
      - TRANSFER_MULTIPART_THRESHOLD_MB=45
      - TRANSFER_MIN_PART_SIZE_MB=32
      - TRANSFER_MAX_CONNS_PER_HOST=1024
      - TRANSFER_FORCE_HTTP2=true
      - TRANSFER_LIST_PARTS_TIMEOUT_SECONDS=60
      - TRANSFER_LIST_PARTS_RETRY_COUNT=2
      - TRANSFER_DEST_S3_TIMEOUT_SECONDS=60
      - TRANSFER_SERVICE_TIMEOUT_SECONDS=180
      - TRANSFER_ALLOW_ZERO_SIZE_FILE=false
    volumes:
      - ./config/config.yaml:/app/config.yaml
    depends_on:
      - backend-api
    dns:
      - 1.1.1.1
      - 8.8.8.8
      - 223.5.5.5
    networks:
      - unbound

networks:
  unbound:
    driver: bridge

volumes:
  redis_data:
  postgres_data:
