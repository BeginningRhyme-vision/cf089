apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: unbound-future
  labels:
    app: backend-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
    spec:
      imagePullSecrets:
      - name: unbound-registry-secret
      containers:
      - name: backend-api
        image: 209.222.101.19:5000/unbound-backend:latest
        imagePullPolicy: Always
        env:
        - name: TRANSFER_MULTIPART_CHECKPOINT_TTL_HOURS
          value: "72"
        - name: TRANSFER_RESUME_RESERVED_WORKERS
          value: "0"
        - name: TRANSFER_AUTO_RETRY_FAILED_ENABLED
          value: "false"
        - name: TRANSFER_AUTO_RETRY_FAILED_COOLDOWN_SECONDS
          value: "60"
        - name: TRANSFER_AUTO_RETRY_FAILED_BATCH_SIZE
          value: "200"
        - name: TRANSFER_AUTO_RETRY_FAILED_POLL_SECONDS
          value: "5"
        ports:
        - containerPort: 8080
        volumeMounts:
        - name: config-volume
          mountPath: /app/config.yaml
          subPath: config.yaml
        livenessProbe:
          httpGet:
            path: /metrics
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: config-volume
        configMap:
          name: unbound-backend-config
---
apiVersion: v1
kind: Service
metadata:
  name: backend-api
  namespace: unbound-future
  labels:
    service.cloud.tencent.com/loadbalance-type: OPEN
  annotations:
    service.kubernetes.io/service.extensiveParameters: '{"AddressIPVersion":"IPV4","InternetAccessible":{"InternetChargeType":"TRAFFIC_POSTPAID_BY_HOUR","InternetMaxBandwidthOut":10}}'
spec:
  selector:
    app: backend-api
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
  type: LoadBalancer
