apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: unbound-future
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
      - name: unbound-registry-secret
      containers:
      - name: frontend
        image: image.unboundfuture.ai/unbound-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: unbound-future
spec:
  selector:
    app: frontend
  ports:
  - protocol: TCP
    port: 80
    targetPort: 80
  type: ClusterIP
---
# Alias Service for backend-api to match frontend nginx config (http://backend:8080)
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: unbound-future
spec:
  selector:
    app: backend-api
  ports:
  - protocol: TCP
    port: 8080
    targetPort: 8080
  type: ClusterIP
