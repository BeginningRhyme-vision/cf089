apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: unbound-future
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;
        client_max_body_size 1024M;

        # Serve the React Application (SPA)
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            # Fallback to index.html for React Router
            try_files $uri $uri/ /index.html;
        }

        # Proxy API requests to the Backend Service
        location /api/ {
            proxy_pass http://backend-api:8080/api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /auth/callback {
            proxy_pass http://backend-api:8080/api/auth/feishu/callback;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: unbound-future
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
      - name: unbound-registry-secret
      containers:
      - name: frontend
        image: 209.222.101.19:5000/unbound-frontend:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d/default.conf
          subPath: default.conf
      volumes:
      - name: nginx-config
        configMap:
          name: frontend-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: unbound-future
  labels:
    service.cloud.tencent.com/loadbalance-type: OPEN
  annotations:
    service.kubernetes.io/service.extensiveParameters: '{"AddressIPVersion":"IPV4","InternetAccessible":{"InternetChargeType":"TRAFFIC_POSTPAID_BY_HOUR","InternetMaxBandwidthOut":10}}'
spec:
  selector:
    app: frontend
  ports:
  - name: http
    protocol: TCP
    port: 80
    targetPort: 80
  - name: callback
    protocol: TCP
    port: 3000
    targetPort: 80
  type: LoadBalancer
