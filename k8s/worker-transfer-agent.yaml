apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-transfer-agent
  namespace: unbound-future
  labels:
    app: worker-transfer-agent
spec:
  replicas: 0
  selector:
    matchLabels:
      app: worker-transfer-agent
  template:
    metadata:
      labels:
        app: worker-transfer-agent
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9094"
        prometheus.io/path: "/metrics"
    spec:
      imagePullSecrets:
      - name: unbound-registry-secret
      containers:
      - name: worker-transfer-agent
        image: 209.222.101.19:5000/unbound-worker-transfer:latest
        imagePullPolicy: Always
        command: ["transfer"]
        env:
        - name: BACKEND_API_URL
          value: "http://backend-api:8080/api"
        - name: TRANSFER_MAX_WORKERS
          value: "16"
        - name: TRANSFER_TASK_BUFFER
          value: "64"
        - name: TRANSFER_PART_CONCURRENCY
          value: "8"
        - name: TRANSFER_RESUME_FAIL_STREAK_LIMIT
          value: "5"
        - name: TRANSFER_LIST_PARTS_TIMEOUT_SECONDS
          value: "60"
        - name: TRANSFER_LIST_PARTS_RETRY_COUNT
          value: "2"
        ports:
        - containerPort: 9094
        volumeMounts:
        - name: config-volume
          mountPath: /app/config.yaml
          subPath: config.yaml
      volumes:
      - name: config-volume
        configMap:
          name: unbound-backend-config
---
apiVersion: v1
kind: Service
metadata:
  name: worker-transfer-agent
  namespace: unbound-future
spec:
  selector:
    app: worker-transfer-agent
  ports:
  - protocol: TCP
    port: 9094
    targetPort: 9094
  type: ClusterIP
