apiVersion: apps/v1
kind: Deployment
metadata:
  name: ffmpeg-scanner
  namespace: unbound-future
  labels:
    app: ffmpeg-scanner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ffmpeg-scanner
  template:
    metadata:
      labels:
        app: ffmpeg-scanner
    spec:
      imagePullSecrets:
      - name: unbound-registry-secret
      containers:
      - name: ffmpeg-scanner
        image: 209.222.101.19:5000/unbound-worker-ffmpeg:latest
        imagePullPolicy: Always
        command: ["ffmpeg_scanner"]
        env:
        - name: BACKEND_API_URL
          value: "http://backend.admin.unboundfuture.ai:8080/api"
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: unbound-backend-config
              key: REDIS_URL
        - name: PROVIDER
          value: "aliyun"
        - name: ZONE
          value: "cn-hangzhou"
        - name: FFMPEG_QUEUE_PREFIX
          value: "ffmpeg-aliyun"
        - name: FFMPEG_REQUIRE_PRIVATE_ENDPOINT
          value: "true"
        - name: FFMPEG_INTERNAL_ENDPOINT_KEYWORDS
          value: "internal,intranet,private,privatelink,vpc,aliyuncs,ivolces,tos-s3"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ffmpeg-worker
  namespace: unbound-future
  labels:
    app: ffmpeg-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ffmpeg-worker
  template:
    metadata:
      labels:
        app: ffmpeg-worker
    spec:
      imagePullSecrets:
      - name: unbound-registry-secret
      containers:
      - name: ffmpeg-worker
        image: 209.222.101.19:5000/unbound-worker-ffmpeg:latest
        imagePullPolicy: Always
        command: ["ffmpeg_worker"]
        env:
        - name: BACKEND_API_URL
          value: "http://backend.admin.unboundfuture.ai:8080/api"
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: unbound-backend-config
              key: REDIS_URL
        - name: MAX_THREADS
          value: "32"
        - name: FFMPEG_QUEUE_PREFIX
          value: "ffmpeg-aliyun"
        resources:
          requests:
            memory: "40Gi"
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory
