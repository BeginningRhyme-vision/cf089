apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-ffmpeg
  namespace: unbound-future
  labels:
    app: worker-ffmpeg
spec:
  replicas: 2
  selector:
    matchLabels:
      app: worker-ffmpeg
  template:
    metadata:
      labels:
        app: worker-ffmpeg
    spec:
      imagePullSecrets:
      - name: unbound-registry-secret
      containers:
      - name: worker-ffmpeg
        image: image.unboundfuture.ai/unbound-worker-ffmpeg:latest
        imagePullPolicy: Always
        env:
        - name: BACKEND_API_URL
          value: "http://backend.admin.unboundfuture.ai:8080/api"
        resources:
          requests:
            memory: "30Gi"
        volumeMounts:
        - name: config-volume
          mountPath: /app/config.yaml
          subPath: config.yaml
        - name: dshm
          mountPath: /dev/shm
      volumes:
      - name: config-volume
        configMap:
          name: unbound-backend-config
      - name: dshm
        emptyDir:
          medium: Memory
