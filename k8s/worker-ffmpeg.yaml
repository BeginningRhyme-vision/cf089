apiVersion: apps/v1
kind: Deployment
metadata:
  name: ffmpeg-scanner
  namespace: unbound-future
  labels:
    app: ffmpeg-scanner
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ffmpeg-scanner
  template:
    metadata:
      labels:
        app: ffmpeg-scanner
    spec:
      imagePullSecrets:
      - name: unbound-registry-secret
      containers:
      - name: ffmpeg-scanner
        image: image.unboundfuture.ai/unbound-worker-ffmpeg:latest
        imagePullPolicy: Always
        command: ["ffmpeg_scanner"]
        env:
        - name: BACKEND_API_URL
          value: "http://backend.admin.unboundfuture.ai:8080/api"
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: unbound-backend-config
              key: REDIS_URL
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ffmpeg-worker
  namespace: unbound-future
  labels:
    app: ffmpeg-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ffmpeg-worker
  template:
    metadata:
      labels:
        app: ffmpeg-worker
    spec:
      imagePullSecrets:
      - name: unbound-registry-secret
      containers:
      - name: ffmpeg-worker
        image: image.unboundfuture.ai/unbound-worker-ffmpeg:latest
        imagePullPolicy: Always
        command: ["ffmpeg_worker"]
        env:
        - name: BACKEND_API_URL
          value: "http://backend.admin.unboundfuture.ai:8080/api"
        - name: REDIS_URL
          valueFrom:
            configMapKeyRef:
              name: unbound-backend-config
              key: REDIS_URL
        - name: MAX_THREADS
          value: "512"
        resources:
          requests:
            memory: "40Gi"
        volumeMounts:
        - name: dshm
          mountPath: /dev/shm
      volumes:
      - name: dshm
        emptyDir:
          medium: Memory