apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-downloader-py
  namespace: unbound-future
  labels:
    app: worker-downloader-py
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-downloader-py
  template:
    metadata:
      labels:
        app: worker-downloader-py
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9092"
        prometheus.io/path: "/metrics"
    spec:
      imagePullSecrets:
      - name: unbound-registry-secret
      containers:
      - name: worker-downloader-py
        image: image.unboundfuture.ai/unbound-worker-downloader:latest
        imagePullPolicy: Always
        command: ["python", "get_yt_metadata.py"]
        env:
        - name: BACKEND_API_URL
          value: "http://backend-api:8080/api"
        ports:
        - containerPort: 9092
        volumeMounts:
        - name: config-volume
          mountPath: /app/config.yaml
          subPath: config.yaml
      volumes:
      - name: config-volume
        configMap:
          name: unbound-backend-config
---
apiVersion: v1
kind: Service
metadata:
  name: worker-downloader-py
  namespace: unbound-future
spec:
  selector:
    app: worker-downloader-py
  ports:
  - protocol: TCP
    port: 9092
    targetPort: 9092
  type: ClusterIP
