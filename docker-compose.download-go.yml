version: "3.8"

services:
  worker-downloader-go:
    image: 209.222.101.19:5000/unbound-worker-downloader:latest
    command: ["downloader"]
    environment:
      - BACKEND_API_URL=${BACKEND_API_URL:-http://209.222.101.19:8080/api}
      - MACHINE_NAME=${MACHINE_NAME:-yt-node-1}
      - USE_PROXY=${USE_PROXY:-true}
      - DOWNLOAD_MAX_CONCURRENT_WORKERS=${DOWNLOAD_MAX_CONCURRENT_WORKERS:-32}
      - DOWNLOAD_CONCURRENT_CHUNKS_PER_FILE=${DOWNLOAD_CONCURRENT_CHUNKS_PER_FILE:-1}
      - DOWNLOAD_REQUESTS_PER_MINUTE=${DOWNLOAD_REQUESTS_PER_MINUTE:-1800}
      - DOWNLOAD_TASK_BUFFER_SIZE=${DOWNLOAD_TASK_BUFFER_SIZE:-400}
      - DOWNLOAD_CHUNK_SIZE=${DOWNLOAD_CHUNK_SIZE:-33554432}
      - DOWNLOAD_LISTPARTS_CONCURRENCY=${DOWNLOAD_LISTPARTS_CONCURRENCY:-4}
      - DOWNLOAD_UPLOAD_RECOVERY_TIMEOUT_SECONDS=${DOWNLOAD_UPLOAD_RECOVERY_TIMEOUT_SECONDS:-1200}
      - DOWNLOAD_SINGLE_VERIFY_TIMEOUT_SECONDS=${DOWNLOAD_SINGLE_VERIFY_TIMEOUT_SECONDS:-600}
      - DOWNLOAD_MISSING_ETAG_RETRY_ATTEMPTS=${DOWNLOAD_MISSING_ETAG_RETRY_ATTEMPTS:-6}
      - DOWNLOAD_TRANSFER_MAX_ATTEMPTS=${DOWNLOAD_TRANSFER_MAX_ATTEMPTS:-10}
      - DOWNLOAD_TRANSFER_RETRY_BACKOFF_SECONDS=${DOWNLOAD_TRANSFER_RETRY_BACKOFF_SECONDS:-10}
      - DIRECT_R2_UPLOAD=${DIRECT_R2_UPLOAD:-false}
      - DIRECT_R2_MAX_BYTES=${DIRECT_R2_MAX_BYTES:-0}
    volumes:
      - ./config/config.yaml:/app/config.yaml
    dns:
      - 1.1.1.1
      - 8.8.8.8
      - 223.5.5.5
