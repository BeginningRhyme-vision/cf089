server {
    listen 80;
    server_name localhost;
    client_max_body_size 1024M;

    # Serve the React Application (SPA)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Fallback to index.html for React Router
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to the Backend Service
    # Assuming the backend service is named 'backend' in docker-compose network
    # and runs on port 8080.
    location /api/ {
        proxy_pass http://backend-api:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /auth/callback {
        proxy_pass http://backend-api:8080/api/auth/feishu/callback;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
